name: Post daily pin

on:
  workflow_dispatch:          # manual trigger for testing
  schedule:
    - cron: "0 6 * * *"   # 7 AM UK
    - cron: "0 8 * * *"   # 9 AM UK
    - cron: "0 10 * * *"  # 11 AM UK
    - cron: "0 12 * * *"  # 1 PM UK
    - cron: "0 14 * * *"  # 3 PM UK
    - cron: "0 16 * * *"  # 5 PM UK
    - cron: "0 18 * * *"  # 7 PM UK
    - cron: "0 20 * * *"  # 9 PM UK

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-dejavu-core
          pip install -r requirements.txt

      - name: Post pin to Pinterest
        env:
          PINTEREST_TOKEN:         ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID:        ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET:    ${{ secrets.PINTEREST_APP_SECRET }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
          PINTEREST_BOARD_ID:      ${{ secrets.PINTEREST_BOARD_ID }}
        run: python scripts/post_pin.py
