name: Post daily pin

on:
  workflow_dispatch:          # manual trigger for testing
  schedule:
    - cron: "0 6 * * *"   # 9 AM UK (BST/UTC+1) with delay
    - cron: "0 15 * * *"  # 5 PM UK (BST/UTC+1) with delay
    - cron: "0 18 * * *"  # 8 PM UK (BST/UTC+1) with delay

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post pin to Pinterest
        env:
          PINTEREST_TOKEN:         ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID:        ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET:    ${{ secrets.PINTEREST_APP_SECRET }}
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
          PINTEREST_BOARD_ID:      ${{ secrets.PINTEREST_BOARD_ID }}
        run: python scripts/post_pin.py
