name: Generate weekly pins

on:
  workflow_dispatch:          # run manually anytime from GitHub UI
  schedule:
    - cron: "0 8 * * 1"      # every Monday 8am UTC

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: pip install requests amazon-paapi

      - name: Generate pins
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:             ${{ secrets.SUPABASE_KEY }}
          PEXELS_API_KEY:           ${{ secrets.PEXELS_API_KEY }}
          AMAZON_CREDENTIAL_ID:     ${{ secrets.AMAZON_CREDENTIAL_ID }}
          AMAZON_CREDENTIAL_SECRET: ${{ secrets.AMAZON_CREDENTIAL_SECRET }}
          AMAZON_ASSOCIATE_TAG:     ${{ secrets.AMAZON_ASSOCIATE_TAG }}
        run: python scripts/generate_pins.py
