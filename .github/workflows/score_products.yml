name: Score products

on:
  workflow_dispatch:
    inputs:
      force_score:
        description: 'Bypass the 6-day cooldown? (1 for yes, 0 for no)'
        required: false
        default: '0'
  schedule:
    - cron: "0 8 * * 5"      # every Friday 7am UTC (before pin generation)

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Score products
        env:
          FORCE_SCORE:     ${{ github.event.inputs.force_score || '0' }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
          PINTEREST_TOKEN: ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID:        ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET:    ${{ secrets.PINTEREST_APP_SECRET }}
        run: python scripts/score_products.py
